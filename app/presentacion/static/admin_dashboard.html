<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Analizador Estático</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --bg-a: #0f172a;
      --bg-b: #1e3a8a;
      --card-bg: #ffffff;
      --accent: #0ea5e9;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.2), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(34, 197, 94, 0.15), transparent 35%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      color: #0f172a;
    }

    .dashboard-wrap {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .glass-card {
      border: 0;
      border-radius: 1rem;
      background: var(--card-bg);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.22);
    }

    .metric-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      background: #e0f2fe;
      color: #0c4a6e;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-badge {
      font-size: 0.8rem;
      padding: 0.35em 0.65em;
    }
  </style>
</head>
<body>
  <div class="dashboard-wrap">
    <header class="glass-card p-4 p-md-5 mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <h1 class="h3 mb-1">Panel de Administración</h1>
          <p class="text-secondary mb-0">Gestión de usuarios y auditoría de acciones.</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="metric-chip">Admin: <strong id="current-user">-</strong></span>
          <button id="logout-button" class="btn btn-outline-danger btn-sm" type="button">Cerrar Sesion</button>
        </div>
      </div>
    </header>

    <section class="glass-card p-4 mb-4">
      <ul class="nav nav-pills mb-3" id="admin-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="users-tab" data-bs-toggle="pill" data-bs-target="#users-panel" type="button" role="tab" aria-controls="users-panel" aria-selected="true">Usuarios</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="actions-tab" data-bs-toggle="pill" data-bs-target="#actions-panel" type="button" role="tab" aria-controls="actions-panel" aria-selected="false">Acciones Recientes</button>
        </li>
      </ul>

      <div class="tab-content" id="admin-tabs-content">
        <!-- Panel de Usuarios -->
        <div class="tab-pane fade show active" id="users-panel" role="tabpanel" aria-labelledby="users-tab">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Estado de Usuarios</h2>
            <button id="refresh-users" class="btn btn-outline-secondary btn-sm" type="button">Actualizar</button>
          </div>

          <!-- Filtros de Usuarios -->
          <div class="row g-2 mb-3">
            <div class="col-md-4">
              <input type="text" id="users-search" class="form-control form-control-sm" placeholder="Buscar por usuario...">
            </div>
            <div class="col-md-4">
              <select id="users-role-filter" class="form-select form-select-sm">
                <option value="all">Todos los Roles</option>
                <option value="admin">Admin</option>
                <option value="developer">Developer</option>
                <option value="system">System</option>
              </select>
            </div>
            <div class="col-md-4">
              <select id="users-status-filter" class="form-select form-select-sm">
                <option value="all">Cualquier Sesión</option>
                <option value="logged_in">Logeado</option>
                <option value="logged_out">Desconectado</option>
              </select>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Usuario</th>
                  <th>Rol</th>
                  <th>Estado</th>
                  <th>Sesión</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="5" class="text-center text-muted">Cargando usuarios...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Panel de Acciones -->
        <div class="tab-pane fade" id="actions-panel" role="tabpanel" aria-labelledby="actions-tab">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Auditoría de Acciones</h2>
            <button id="refresh-actions" class="btn btn-outline-secondary btn-sm" type="button">Actualizar</button>
          </div>

          <!-- Filtros de Acciones -->
          <div class="row g-2 mb-3">
            <div class="col-md-6">
              <input type="text" id="actions-user-search" class="form-control form-control-sm" placeholder="Buscar por usuario (ej. admin)...">
            </div>
            <div class="col-md-6">
              <input type="text" id="actions-text-search" class="form-control form-control-sm" placeholder="Buscar por acción (ej. Inicio de sesión)...">
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Fecha y Hora</th>
                  <th>Usuario</th>
                  <th>Acción</th>
                </tr>
              </thead>
              <tbody id="actions-tbody">
                <tr><td colspan="4" class="text-center text-muted">Cargando acciones...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script>
    const userId = localStorage.getItem("user_id");
    const userRole = localStorage.getItem("user_role");
    
    // Si no está logueado, redirigir a inicio.
    if (!userId) {
      window.location.href = "/";
    }
    
    // Si necesitas validar estrictamente que sea admin, podrías descomentar esto:
    if (userRole !== "system" && userRole !== "admin") {
      alert("Acceso denegado. Se requiere rol de administrador.");
      window.location.href = "/dashboard";
    }

    document.getElementById("current-user").textContent = localStorage.getItem("username") || userId;

    const logoutButton = document.getElementById("logout-button");
    logoutButton.addEventListener("click", async () => {
      try {
        const formData = new FormData();
        formData.append("user_id", userId);
        await fetch("/api/auth/logout", {
          method: "POST",
          body: formData,
        });
      } catch (error) {
        console.error("Error al cerrar sesión", error);
      } finally {
        localStorage.removeItem("user_id");
        localStorage.removeItem("user_role");
        localStorage.removeItem("username");
        window.location.href = "/";
      }
    });

    let allUsers = [];
    let allActions = [];

    function renderUsers() {
      const tbody = document.getElementById("users-tbody");
      const search = document.getElementById("users-search").value.toLowerCase();
      const roleFilter = document.getElementById("users-role-filter").value;
      const statusFilter = document.getElementById("users-status-filter").value;

      let filtered = allUsers.filter(u => {
        const matchSearch = u.username.toLowerCase().includes(search);
        const matchRole = roleFilter === "all" || u.role === roleFilter;
        const matchStatus = statusFilter === "all" || 
                           (statusFilter === "logged_in" && u.is_logged_in) || 
                           (statusFilter === "logged_out" && !u.is_logged_in);
        return matchSearch && matchRole && matchStatus;
      });

      // Ordenar explícitamente por ID para evitar que cambien de posición
      filtered.sort((a, b) => a.id - b.id);

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No se encontraron usuarios que coincidan con los filtros.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(u => `
        <tr>
          <td>${u.id}</td>
          <td><strong>${u.username}</strong></td>
          <td><span class="badge bg-secondary status-badge">${u.role}</span></td>
          <td>
            ${u.active_status 
              ? '<span class="badge bg-success status-badge">Activo</span>' 
              : '<span class="badge bg-danger status-badge">Inactivo</span>'}
          </td>
          <td>
            ${u.is_logged_in 
              ? '<span class="badge bg-primary status-badge">Logeado</span>' 
              : '<span class="badge bg-light text-dark border status-badge">Desconectado</span>'}
          </td>
        </tr>
      `).join("");
    }

    function renderActions() {
      const tbody = document.getElementById("actions-tbody");
      const userSearch = document.getElementById("actions-user-search").value.toLowerCase();
      const textSearch = document.getElementById("actions-text-search").value.toLowerCase();

      let filtered = allActions.filter(a => {
        const matchUser = a.username.toLowerCase().includes(userSearch) || a.user_id.toString().includes(userSearch);
        const matchText = a.action.toLowerCase().includes(textSearch);
        return matchUser && matchText;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No se encontraron acciones.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(a => {
        const d = new Date(a.timestamp);
        return `
        <tr>
          <td>${a.id}</td>
          <td>${d.toLocaleDateString()} ${d.toLocaleTimeString()}</td>
          <td><span class="fw-medium">${a.username}</span> <small class="text-muted">(ID: ${a.user_id})</small></td>
          <td>${a.action}</td>
        </tr>
      `}).join("");
    }

    async function loadUsers() {
      const tbody = document.getElementById("users-tbody");
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Cargando usuarios...</td></tr>';
      try {
        const response = await fetch("/api/admin/users");
        if (!response.ok) throw new Error("Error al obtener usuarios");
        allUsers = await response.json();
        renderUsers();
      } catch (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error al cargar usuarios.</td></tr>';
      }
    }

    async function loadActions() {
      const tbody = document.getElementById("actions-tbody");
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Cargando acciones...</td></tr>';
      try {
        const response = await fetch("/api/admin/actions");
        if (!response.ok) throw new Error("Error al obtener acciones");
        allActions = await response.json();
        renderActions();
      } catch (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error al cargar acciones.</td></tr>';
      }
    }

    document.getElementById("refresh-users").addEventListener("click", loadUsers);
    document.getElementById("refresh-actions").addEventListener("click", loadActions);

    document.getElementById("users-search").addEventListener("input", renderUsers);
    document.getElementById("users-role-filter").addEventListener("change", renderUsers);
    document.getElementById("users-status-filter").addEventListener("change", renderUsers);

    document.getElementById("actions-user-search").addEventListener("input", renderActions);
    document.getElementById("actions-text-search").addEventListener("input", renderActions);

    // Cargar datos al iniciar
    loadUsers();
    loadActions();

    // Configurar actualización automática cada 5 segundos (5000 ms)
    setInterval(() => {
      // Se llaman silenciosamente para no interrumpir si el usuario está leyendo
      fetch("/api/admin/users").then(res => res.json()).then(data => {
        allUsers = data;
        renderUsers();
      }).catch(console.error);

      fetch("/api/admin/actions").then(res => res.json()).then(data => {
        allActions = data;
        renderActions();
      }).catch(console.error);
    }, 5000);
  </script>
</body>
</html>
