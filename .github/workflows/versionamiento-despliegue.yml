name: Versionamiento y Despliegue

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tipo_version:
        description: 'Tipo de incremento de versión (patch, minor, major)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      ejecutar_despliegue:
        description: 'Desplegar la aplicación en Render'
        required: true
        type: boolean
        default: true

jobs:
  versionamiento_y_release:
    name: Versionamiento y Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar bump-my-version
        run: pip install bump-my-version

      - name: Incrementar versión
        run: |
          # Requiere configuración previa de .bumpversion.cfg o pyproject.toml para definir dónde se cambia la versión
          echo "Ejecutando: bump-my-version bump ${{ github.event.inputs.tipo_version }}"
          
          # Descomentar para aplicar el incremento real:
          # bump-my-version bump ${{ github.event.inputs.tipo_version }}
          # git push --follow-tags

      - name: Crear Draft de GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "draft-${{ github.run_id }}"
          name: "Release Manual - ${{ github.event.inputs.tipo_version }}"
          draft: true
          generate_release_notes: true

  despliegue_render:
    name: Despliegue en Render
    needs: versionamiento_y_release
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.ejecutar_despliegue == 'true' }}
    steps:
      - name: Ejecutar Deploy Hook de Render
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$deploy_url" ]; then
            echo "La variable RENDER_DEPLOY_HOOK_URL no está configurada en los secrets."
            echo "Por favor, añade el deploy hook de Render (Settings -> Deploy Hook) como un secreto de GitHub (RENDER_DEPLOY_HOOK_URL)."
            echo "Omitiendo el despliegue..."
            exit 1
          fi
          echo "Disparando el despliegue en Render..."
          curl -X POST "$deploy_url"
