name: Pruebas Automatizadas

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      ejecutar_unitarias_integracion:
        description: 'Ejecutar pruebas unitarias y de integración'
        required: true
        type: boolean
        default: true
      ejecutar_mutantes:
        description: 'Ejecutar pruebas de mutación'
        required: true
        type: boolean
        default: true
      ejecutar_ui:
        description: 'Ejecutar pruebas de interfaz (UI)'
        required: true
        type: boolean
        default: true
      ejecutar_bdd:
        description: 'Ejecutar pruebas BDD'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pruebas:
    name: Ejecución de Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov mutmut behave playwright pytest-bdd pytest-playwright

      - name: Instalar navegadores para Playwright
        if: ${{ github.event.inputs.ejecutar_ui == 'true' }}
        run: |
          python -m playwright install --with-deps

      - name: Crear carpeta para reportes
        run: mkdir -p public

      - name: Pruebas Unitarias e Integración
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.ejecutar_unitarias_integracion == 'true' }}
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=html:public/coverage --cov-report=xml tests/test_unit.py

      - name: Pruebas de Mutación (mutmut)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.ejecutar_mutantes == 'true' }}
        run: |
          mutmut run || echo "Se detectaron mutantes que sobrevivieron"
          mkdir -p public/mutmut
          echo "<html><body><h1>Mutmut log (Revisar en consola de Actions)</h1></body></html>" > public/mutmut/index.html

      - name: Pruebas de Interfaz (UI)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.ejecutar_ui == 'true' }}
        run: |
          PYTHONPATH=. pytest tests/ui/ --video=on --output=public/ui-videos || echo "Algunas pruebas de interfaz fallaron"

      - name: Pruebas BDD
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.ejecutar_bdd == 'true' }}
        run: |
          PYTHONPATH=. pytest tests/step_defs/ || echo "Algunas pruebas BDD fallaron"
          
      - name: Create index.html for reports
        run: |
          cat <<EOF > public/index.html
          <!DOCTYPE html><html><head><title>Reportes de Pruebas</title></head><body>
          <h1>Reportes de Pruebas Automatizadas</h1>
          <ul>
            <li><a href="coverage/index.html">Reporte de Cobertura (Coverage)</a></li>
            <li><a href="mutmut/index.html">Reporte de Pruebas de Mutación (mutmut)</a></li>
            <li><a href="ui-videos/">Videos de Pruebas UI</a></li>
          </ul>
          </body></html>
          EOF

      - name: Guardar reporte de cobertura (XML) para SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
